<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>
        Generate a <br />
        <span>Random Password🔒</span>
      </h1>

      <div class="copy-msg">
        <span id="copy-msg"></span>
      </div>
      <div class="password-display">
        <div class="icons-box">
          <input type="text" id="password" placeholder="Your password " />
          <i id="ey-open" class="fa-solid fa-eye"></i>
          <i id="ey-close" class="fa-solid fa-ban"></i>
        </div>
        <div class="icons-box">
          <img src="./image/copy.png" id="copy-img" />
        </div>
      </div>

      <button id="generate-btn">
        <img src="./image/padlock.png" />
        Generate Password
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
